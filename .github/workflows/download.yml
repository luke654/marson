name: Download feed giornaliero

on:
  schedule:
    - cron: '30 3 * * *'  # 4:30 ora italiana (UTC+1 inverno / aggiusta in estate)
  workflow_dispatch:        # avvio manuale per testare

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install requests

      - name: Scarica e decomprimi feed
        run: python scripts/download.py

      - name: Salva XML come artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed-xml-${{ github.run_id }}
          path: output/xml/
          retention-days: 7
