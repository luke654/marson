name: Download feed giornaliero
on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install requests

      - name: Scarica e converti feed in JSON
        run: python scripts/download.py

      - name: Commit e push feed.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.json
          git diff --cached --quiet || git commit -m "chore: aggiorna feed.json [skip ci]"
          git push
