name: Download feed giornaliero
on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # fix deprecation warning
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install requests

      - name: Scarica e converti feed in JSON
        run: python scripts/download.py

      - name: Salva JSON come artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed-json-${{ github.run_id }}
          path: output/feed.json
          retention-days: 7
